services:
  - type: web
    name: idempotency-gateway
    runtime: node
    rootDir: backend/Idempotency-gateway
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: idempotency-db
          property: connectionString

databases:
  - name: idempotency-db
    databaseName: idempotency_db
    user: postgres
    plan: free
